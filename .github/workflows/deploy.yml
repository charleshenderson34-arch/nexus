name: Deploy Nexus
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Trust Wallet Core Headers
        run: |
          git clone --depth 1 https://github.com/trustwallet/wallet-core.git
          sudo mkdir -p /usr/local/include/TrustWalletCore
          sudo cp -r wallet-core/include/TrustWalletCore/* /usr/local/include/TrustWalletCore/

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install and Build
        run: |
          npm install
          # Add your specific build command here if needed
          
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: npx wrangler deploy
