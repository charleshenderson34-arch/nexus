name: Deploy Nexus
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Trust Wallet Core Headers
        run: |
          git clone --depth 1 https://github.com/trustwallet/wallet-core.git
          
      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install and Build
        env:
          # Tell CMake where to look for Trust Wallet Core headers
          CPLUS_INCLUDE_PATH: ${{ github.workspace }}/wallet-core/include
        run: |
          npm install
          # Your existing build command, e.g., 'cmake -B build -D...' then 'make'
          
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: npx wrangler deploy
