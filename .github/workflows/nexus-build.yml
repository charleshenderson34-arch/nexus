name: Trust Wallet Ingestion Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Full Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libboost-all-dev protobuf-compiler libprotobuf-dev ruby libcurl4-openssl-dev build-essential ninja-build

      - name: Build Wallet Core
        run: |
          cd external/wallet-core
          ./tools/generate-files native
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j4 VERBOSE=1

      - name: Compile Ingestion Engine
        run: |
          g++ -std=c++17 ingestion.cpp broadcaster.cpp \
            -Iexternal/wallet-core/include \
            -Lexternal/wallet-core/build -lTrustWalletCore \
            -lcurl -o ingest

      - name: Execute Portfolio Ingestion
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: ./ingest
