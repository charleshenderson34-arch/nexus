name: Nexus Cloud Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang libboost-all-dev protobuf-compiler libprotobuf-dev

    - name: Configure and Build Wallet Core
      run: |
        cmake -B build -DBUILD_TESTS=OFF -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
        cmake --build build -j4
