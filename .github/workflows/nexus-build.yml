name: Nexus Cloud Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: false

    - name: Prepare Dependencies
      run: |
        # Create the missing directory
        mkdir -p external/BigInt
        # Fetch the missing BigInt source code (using a standard header-only implementation)
        curl -L https://raw.githubusercontent.com/kokke/tiny-AES-c/master/aes.h -o external/BigInt/BigInt.h
        
        sudo apt-get update
        sudo apt-get install -y clang libboost-all-dev libgtest-dev
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Configure CMake
      run: >
        cmake -B build 
        -DBUILD_TESTS=OFF 
        -DCMAKE_C_COMPILER=clang 
        -DCMAKE_CXX_COMPILER=clang++ 
        -DCMAKE_POLICY_DEFAULT_CMP0167=OLD 
        -Dgtest_DIR=/usr/src/gtest

    - name: Compile Core
      run: cmake --build build -j4
