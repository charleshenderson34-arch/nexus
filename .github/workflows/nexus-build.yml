name: Ingest
on: [push]
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev
      - name: Build Wallet Core via Composite Action
        uses: ./.github/actions/build-wallet-core
        with:
          # Ensure the build script uses a predictable path
          build-path: ./external/wallet-core/build/local
      - name: Compile Custom Infrastructure Engine
        run: |
          # Use the specific path where the composite action is configured to install
          g++ -std=c++17 ingestion.cpp broadcaster.cpp           -I./external/wallet-core/build/local/include           -I/usr/include           -lcurl           -o engine_build
