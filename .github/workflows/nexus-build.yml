name: Trust Wallet SDK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang ninja-build libboost-all-dev libgtest-dev protobuf-compiler libprotobuf-dev ruby

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Generate protobuf and coin files
      run: ./tools/generate-files

    - name: Configure SDK
      run: >
        cmake -B build
        -DCMAKE_BUILD_TYPE=Release
        -DTW_UNIT_TESTS=OFF
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_CXX_COMPILER=clang++
        -DProtobuf_USE_STATIC_LIBS=OFF

    - name: Compile SDK
      run: cmake --build build -j4
