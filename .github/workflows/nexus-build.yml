name: Nexus Cloud Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=OFF

    - name: Compile Core
      run: cmake --build build -j4
