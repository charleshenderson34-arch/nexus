name: Trust Wallet Ingestion Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      RUSTC_BOOTSTRAP: 1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libboost-all-dev protobuf-compiler libprotobuf-dev ruby libcurl4-openssl-dev

      - name: Install Toolchains
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          cargo install --locked cbindgen

      - name: Build Wallet Core
        run: |
          cd external/wallet-core
          ./tools/generate-files native
          cmake -H. -Bbuild -DCMAKE_BUILD_TYPE=Release -DTW_UNIT_TESTS=OFF
          cmake --build build -j4

      - name: Compile Ingestion Engine
        run: |
          g++ -std=c++17 ingestion.cpp broadcaster.cpp \
            -Iexternal/wallet-core/include \
            -Lexternal/wallet-core/build -lTrustWalletCore \
            -lcurl -o ingest

      - name: Execute Portfolio Ingestion
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: ./ingest
