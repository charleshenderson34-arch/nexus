name: Nexus Cloud Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: false

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libboost-all-dev libgtest-dev
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Configure CMake
      # Added -DGOOGLETEST_DIR to point to system install
      # Added -DFETCHCONTENT_FULLY_DISCONNECTED=OFF to allow downloading missing libs
      run: >
        cmake -B build 
        -DBUILD_TESTS=OFF 
        -DCMAKE_C_COMPILER=clang 
        -DCMAKE_CXX_COMPILER=clang++ 
        -DCMAKE_POLICY_DEFAULT_CMP0167=OLD 
        -DFETCHCONTENT_FULLY_DISCONNECTED=OFF

    - name: Compile Core
      run: cmake --build build -j4
