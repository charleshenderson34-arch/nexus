name: 'Build Wallet Core'
description: 'Builds the core wallet architecture using the Clang compiler toolchain and satisfies Boost library requirements'
inputs:
  build-path:
    description: 'Optional target path for the build buildout'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Install System Dependencies (Boost)
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-all-dev
      shell: bash

    - name: Run build script with Clang toolchain
      run: |
        export CC=clang
        export CXX=clang++
        ./build.sh
      shell: bash
